<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Traveloop – Register</title>
<link rel="stylesheet" href="styles.css">

<style>
body { background: linear-gradient(135deg, var(--navy) 0%, #1a3a6a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }

.reg-card { background: var(--cream); border-radius: var(--radius-xl); padding: 48px; max-width: 600px; width: 100%; box-shadow: var(--shadow-lg); animation: fadeUp 0.5s ease; }

.reg-header { text-align: center; margin-bottom: 36px; }

.logo { font-family: var(--font-display); font-size: 1.75rem; color: var(--navy); font-weight: 700; text-decoration: none; }
.logo span { color: var(--amber); }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

.form-full { grid-column: 1 / -1; }

.form-stack { display: flex; flex-direction: column; gap: 14px; }

.terms { display: flex; gap: 10px; align-items: flex-start; font-size: 0.82rem; color: var(--text-mid); }

.terms input { margin-top: 2px; accent-color: var(--amber); }

.login-link { text-align: center; font-size: 0.85rem; color: var(--text-light); margin-top: 8px; }

.login-link a { color: var(--amber); font-weight: 600; text-decoration: none; }

@media (max-width: 500px) {
  .form-grid { grid-template-columns: 1fr; }
  .reg-card { padding: 32px 20px; }
}
</style>

</head>

<body>

<div class="reg-card">

  <div class="reg-header">
    <a href="01-login.html" class="logo">Travel<span>oop</span></a>
    <h2>Create your account</h2>
    <p>Start planning unforgettable journeys today</p>
  </div>

  <form action="/register" method="POST" class="form-stack">

    <div class="form-grid">

      <div class="field">
        <label>First Name</label>
        <input type="text" name="firstName" placeholder="Alex">
      </div>

      <div class="field">
        <label>Last Name</label>
        <input type="text" name="lastName" placeholder="Morgan">
      </div>

      <div class="field">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="alex@email.com">
      </div>

      <div class="field">
        <label>Phone Number</label>
        <input type="tel" name="phone" placeholder="+1 (555) 000-0000">
      </div>

      <div class="field">
        <label>City</label>
        <input type="text" name="city" placeholder="New York">
      </div>

      <div class="field">
        <label>Country</label>
        <select name="country">
          <option value="">Select country</option>
          <option>United States</option>
          <option>United Kingdom</option>
          <option>Canada</option>
          <option>Australia</option>
          <option>India</option>
          <option>Germany</option>
          <option>France</option>
          <option>Japan</option>
        </select>
      </div>

      <div class="field" style="grid-column:1/-1;">
        <label>Password</label>
        <input type="password" name="password" placeholder="Create a strong password">
      </div>

      <div class="field form-full">
        <label>Additional Information <span style="color:var(--text-light);font-weight:400;font-size:0.75rem;">(optional)</span></label>
        <textarea name="about" placeholder="Tell us about your travel style…"></textarea>
      </div>

    </div>

    <div class="terms">
      <input type="checkbox" name="terms" required>
      <label>I agree to the Terms of Service and Privacy Policy.</label>
    </div>

    <button class="btn btn-primary btn-lg" style="width:100%;justify-content:center;">
      Create Account →
    </button>

    <div class="login-link">
      Already have an account? <a href="01-login.html">Sign in</a>
    </div>

  </form>

</div>

</body>
</html>
